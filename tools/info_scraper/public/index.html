<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Info Scraper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f111a;
      color: #e8e9ed;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #8b5cf6;
    }
    .subtitle {
      font-size: 0.875rem;
      color: #8b8fa3;
      margin-bottom: 24px;
    }
    .card {
      background: #1b1e29;
      border: 1px solid #2b2f3d;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }
    .row:last-child { margin-bottom: 0; }
    input[type="url"] {
      flex: 1;
      padding: 12px 16px;
      background: #161825;
      border: 1px solid #2b2f3d;
      border-radius: 8px;
      color: #e8e9ed;
      font-size: 1rem;
    }
    input[type="url"]::placeholder { color: #5a5e6b; }
    input[type="url"]:focus {
      outline: none;
      border-color: #8b5cf6;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: #8b5cf6;
      color: white;
    }
    .btn-secondary {
      background: #2b2f3d;
      color: #e8e9ed;
    }
    .preview {
      background: #161825;
      border: 1px solid #2b2f3d;
      border-radius: 8px;
      padding: 16px;
      max-height: 400px;
      overflow: auto;
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .preview:empty { display: none; }
    .preview-placeholder {
      color: #5a5e6b;
      font-style: italic;
      padding: 24px;
      text-align: center;
    }
    .status {
      font-size: 0.8125rem;
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
    }
    .status.error { background: rgba(239, 68, 68, 0.15); color: #f87171; }
    .status.success { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
    .status.loading { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
    .opts { flex-wrap: wrap; gap: 16px; }
    .opt { display: flex; align-items: center; gap: 6px; font-size: 0.875rem; cursor: pointer; }
    .opt input { cursor: pointer; }
    .save-row { display: flex; gap: 12px; align-items: center; }
    .save-row select {
      padding: 8px 12px;
      background: #161825;
      border: 1px solid #2b2f3d;
      border-radius: 6px;
      color: #e8e9ed;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Info Scraper</h1>
    <p class="subtitle">Fetch a URL and save its content to the project.</p>

    <div class="card">
      <div class="row">
        <input type="url" id="url" placeholder="https://example.com" />
        <button class="btn-primary" id="scrape">Scrape</button>
      </div>
      <div class="row opts">
        <label class="opt"><input type="checkbox" id="extractMain" checked /> Extract main content</label>
        <label class="opt"><input type="radio" name="format" value="text" checked /> Text Only</label>
        <label class="opt"><input type="radio" name="format" value="markdown" /> Markdown</label>
        <label class="opt"><input type="radio" name="format" value="html" /> HTML</label>
      </div>
      <div id="status"></div>
    </div>

    <div class="card">
      <div class="row" style="margin-bottom: 12px;">
        <strong>Preview</strong>
        <div class="save-row">
          <select id="saveFormat">
            <option value="text">Save as Text</option>
            <option value="markdown">Save as Markdown</option>
            <option value="html">Save as HTML</option>
          </select>
          <button class="btn-secondary" id="save" disabled>Save to output/</button>
        </div>
      </div>
      <div id="preview" class="preview"></div>
      <div id="preview-placeholder" class="preview-placeholder">Enter a URL and click Scrape.</div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
